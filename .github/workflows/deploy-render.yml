# ─────────────────────────────────────────────────────────────────────────────
# DRISHTI — Render Deploy Pipeline (Free Tier)
#
# Gate:  only triggers AFTER the CI workflow passes on master.
# Steps: ci-gate → deploy → smoke-tests → (optional) rollback alert
#
# Required GitHub Secrets:
#   RENDER_DEPLOY_HOOK_API      → Render deploy hook URL for drishti-api
#   RENDER_DEPLOY_HOOK_FRONTEND → Render deploy hook URL for drishti-frontend
#   RENDER_HEALTH_URL           → (optional) override health endpoint URL
# ─────────────────────────────────────────────────────────────────────────────

name: 🚀 Deploy to Render

on:
  # Only deploy when CI passes on master — this is the gate
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]
  # Allow manual trigger for hotfix / rollback re-deploy
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual trigger"

concurrency:
  group: render-deploy
  cancel-in-progress: false    # never cancel an in-flight deploy

jobs:
  # ── Gate: only proceed if CI passed ────────────────────────────────────────
  ci-gate:
    name: "🔒 CI Gate"
    runs-on: ubuntu-latest
    # For workflow_run: block if CI failed. For workflow_dispatch: always proceed.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: CI passed — proceed to deploy
        run: |
          echo "✅ CI gate passed"
          echo "Trigger: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual reason: ${{ github.event.inputs.reason }}"
          else
            echo "CI run: ${{ github.event.workflow_run.html_url }}"
          fi

  # ── Deploy API ──────────────────────────────────────────────────────────────
  deploy-api:
    name: "🚢 Deploy API → Render"
    runs-on: ubuntu-latest
    needs: [ci-gate]
    environment:
      name: production
      url: https://drishti-api.onrender.com
    steps:
      - name: Trigger Render API deploy hook
        env:
          RENDER_DEPLOY_HOOK_API: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_API" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_API secret is not set."
            echo "Set it in: GitHub → Settings → Secrets → Actions"
            exit 1
          fi
          echo "🚀 Triggering API deploy…"
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_API"
          echo "✅ API deploy hook triggered"

  # ── Deploy Frontend ─────────────────────────────────────────────────────────
  deploy-frontend:
    name: "🌐 Deploy Frontend → Render"
    runs-on: ubuntu-latest
    needs: [ci-gate]
    environment:
      name: production
      url: https://drishti-frontend.onrender.com
    steps:
      - name: Trigger Render Frontend deploy hook
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_FRONTEND" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_FRONTEND secret not set — skipping frontend deploy."
            exit 0
          fi
          echo "🚀 Triggering Frontend deploy…"
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_FRONTEND"
          echo "✅ Frontend deploy hook triggered"

  # ── Post-Deploy Smoke Tests ─────────────────────────────────────────────────
  smoke-tests:
    name: "🧪 Post-Deploy Smoke Tests"
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Render cold-start (free tier can take 90s)
        run: |
          echo "⏳ Waiting 90s for Render free-tier cold start…"
          sleep 90

      - name: Health check — API /api/health
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          BASE_URL=${RENDER_HEALTH_URL:-https://drishti-api.onrender.com}
          HEALTH_URL="${BASE_URL}/api/health"
          echo "Checking: $HEALTH_URL"
          for i in 1 2 3 4 5; do
            echo "Attempt $i/5…"
            if curl -fsS --max-time 15 "$HEALTH_URL" | grep -q '"status"'; then
              echo "✅ Health check passed"
              break
            fi
            if [ $i -eq 5 ]; then
              echo "::error::❌ Health check failed after 5 attempts"
              exit 1
            fi
            sleep 20
          done

      - name: Smoke test — API /api/alerts endpoint
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          BASE_URL=${RENDER_HEALTH_URL:-https://drishti-api.onrender.com}
          URL="${BASE_URL}/api/alerts"
          echo "Checking: $URL"
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" --max-time 20 "$URL")
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ /api/alerts returned HTTP $HTTP_CODE"
          else
            echo "::warning::⚠️  /api/alerts returned HTTP $HTTP_CODE (non-fatal)"
          fi

      - name: Smoke test — API /api/network endpoint
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          BASE_URL=${RENDER_HEALTH_URL:-https://drishti-api.onrender.com}
          URL="${BASE_URL}/api/network"
          echo "Checking: $URL"
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" --max-time 20 "$URL")
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ /api/network returned HTTP $HTTP_CODE"
          else
            echo "::warning::⚠️  /api/network returned HTTP $HTTP_CODE"
          fi

      - name: Generate smoke test summary
        if: always()
        run: |
          echo "## 🧪 Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Health (/api/health) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Alerts endpoint | ✅ Checked |" >> $GITHUB_STEP_SUMMARY
          echo "| Network endpoint | ✅ Checked |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Live URL: https://drishti-api.onrender.com" >> $GITHUB_STEP_SUMMARY

  # ── Rollback Alert ──────────────────────────────────────────────────────────
  rollback-alert:
    name: "🔴 Rollback Alert"
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: failure()
    steps:
      - name: Emit rollback instructions
        run: |
          echo "::error::🚨 SMOKE TESTS FAILED — Manual rollback may be required"
          echo ""
          echo "=========================================="
          echo " ROLLBACK RUNBOOK (Quick Reference)"
          echo "=========================================="
          echo ""
          echo "1. Go to Render dashboard:"
          echo "   https://dashboard.render.com"
          echo ""
          echo "2. Select 'drishti-api' → 'Deploys' tab"
          echo "   → Click the last GOOD deploy → 'Rollback to this deploy'"
          echo ""
          echo "3. Select 'drishti-frontend' → repeat step 2"
          echo ""
          echo "4. Re-run smoke tests after rollback:"
          echo "   GitHub Actions → 'Deploy to Render' → 'Re-run failed jobs'"
          echo ""
          echo "Full runbook: docs/RUNBOOK.md"
          echo "=========================================="
