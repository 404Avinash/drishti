# ─────────────────────────────────────────────────────────────────────────────
# DRISHTI — Legacy CI (kept for workflow_dispatch debugging)
# ⚠️  Primary CI is ci.yml  — this file is a lightweight sanity check.
# All action versions pinned to v4. Run via "Run workflow" button only.
# ─────────────────────────────────────────────────────────────────────────────

name: DRISHTI Quick Sanity Check

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  python-ai-backend:
    name: "🐍 Core API & ML Library Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest httpx

      - name: Generate network graph (required for tests)
        run: python scripts/generate_graph.py

      - name: Verify AI/ML library imports
        run: |
          python -c "import networkx as nx; import sklearn; print('✅ AI/ML libraries load correctly.')"

      - name: Syntax linting (fatal errors only)
        run: |
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run critical tests
        run: |
          pytest tests/test_intelligence.py tests/test_cascade.py \
            -v --tb=short || true

  react-leaflet-frontend:
    name: "⚛️ Frontend Vite Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Vite production build
        working-directory: ./frontend
        run: npm run build

  docker-validation:
    name: "🐳 Docker Compose Config Validation"
    runs-on: ubuntu-latest
    needs: [python-ai-backend, react-leaflet-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config (simple)
        run: docker compose -f docker-compose.simple.yml config > /dev/null

      - name: Validate docker-compose config (full)
        run: docker compose -f docker-compose.yml config > /dev/null
