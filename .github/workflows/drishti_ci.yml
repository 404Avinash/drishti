name: DRISHTI NERC Continuous Integration

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  python-ai-backend:
    name: Core API & Scikit-Learn Model Integrity
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install DARPA-Grade Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest httpx
        
    - name: Verify AI Model Initialization
      run: |
        echo "import networkx as nx; import sklearn; print('AI/ML libraries load correctly.')" > check.py
        python check.py
        
    - name: Syntax Linting (Flake8)
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics

  react-leaflet-frontend:
    name: Geographic Tracker & Nginx Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Execute Node 20 Environment
      uses: actions/setup-node@v3
      with:
        node-version: "20"
        
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci
        
    - name: Execute Vite Production Build
      working-directory: ./frontend
      run: npm run build
      
  docker-validation:
    name: Container Registry Simulation
    runs-on: ubuntu-latest
    needs: [python-ai-backend, react-leaflet-frontend]
    steps:
    - uses: actions/checkout@v3
    
    - name: Dry-Run Compose Network Integrations
      run: |
        docker-compose config
