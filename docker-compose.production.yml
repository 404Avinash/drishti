version: '3.8'

services:

  # ── Redis (in-container, no ElastiCache fees) ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: drishti-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  # ── Backend API ─────────────────────────────────────────────────────────────
  drishti-api:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:latest
    container_name: drishti-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://drishti-redis:6379/0
      - DATABASE_URL=${DATABASE_URL}
      - LOG_LEVEL=info
      - ENVIRONMENT=production
    volumes:
      - drishti_data:/app/data
      - drishti_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Nginx serves React + proxies /api → backend) ──────────────────
  drishti-frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:latest
    container_name: drishti-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - drishti-api

  # ── Telemetry Producer (Real-time Indian Railway Grid Physics) ───────────────
  drishti-producer:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:latest
    container_name: drishti-producer
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://drishti-redis:6379/0
      - LOG_LEVEL=info
    command: python backend/devops/telemetry_producer.py

volumes:
  redis_data:
  drishti_data:
  drishti_models:

networks:
  default:
    name: drishti_network
