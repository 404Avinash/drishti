# ─────────────────────────────────────────────────────────────────────────────
# DRISHTI — Production Nginx Configuration
# Serves: React SPA (static) + reverse-proxies /api and /ws to FastAPI
#
# Why this file matters:
#   - WebSocket proxy must set correct headers (Upgrade, Connection)
#   - React Router needs try_files to serve index.html for all routes
#   - API must be proxied so frontend uses same domain (no CORS issues)
#   - Gzip compression cuts transfer size by ~70%
# ─────────────────────────────────────────────────────────────────────────────

# Upstream: FastAPI backend (container name from docker-compose)
upstream drishti_api {
    server drishti-api:8000;
    keepalive 32;  # Reuse connections (important for WebSocket)
}

server {
    listen 80;
    server_name _;

    # ── Root: serve the React SPA ─────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options         DENY             always;
    add_header X-Content-Type-Options  nosniff          always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    add_header Referrer-Policy         strict-origin     always;

    # ── Static assets: aggressive caching (hashed filenames by Vite) ────────
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── network_graph.json: short cache (updated periodically) ───────────────
    location = /network_graph.json {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    # ── WebSocket proxy: /ws/* ─────────────────────────────────────────────
    # CRITICAL: these headers are required for WebSocket upgrade handshake
    location /ws/ {
        proxy_pass         http://drishti_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  86400s;  # 24hr — keep WS alive
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;

        # Disable buffering for real-time streaming
        proxy_buffering off;
    }

    # ── REST API proxy: /api/* ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://drishti_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Cache GET responses for 5 seconds (reduce backend load)
        proxy_cache_valid 200 5s;
        proxy_no_cache $http_upgrade;  # Never cache WebSocket upgrades
    }

    # ── Health check passthrough (for load balancers) ─────────────────────────
    location = /health {
        proxy_pass http://drishti_api/api/health;
        proxy_http_version 1.1;
        access_log off;
    }

    # ── React Router: serve index.html for all unmatched routes ─────────────
    # This is what makes /network, /map, /alerts etc. work without 404
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;  # index.html must NOT be cached (prevents stale deploys)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma no-cache;
    }

    # ── Error pages ──────────────────────────────────────────────────────────
    error_page 404 /index.html;  # React handles 404 routing
    error_page 502 503 504 =503 @backend_down;

    location @backend_down {
        default_type application/json;
        return 503 '{"error":"Backend starting up. Please wait...","status":"starting"}';
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/drishti_access.log combined buffer=32k;
    error_log  /var/log/nginx/drishti_error.log warn;
}
