[general]
# Locust configuration file for DRISHTI load testing

[locust]
# Default host URL
loglevel = INFO

# Stop conditions
stop_timeout = 60

# Request timeout (seconds)
request_timeout = 30

# CSV file path for statistics
csv_prefix = test_results

# HTML report
html = test_results.html

# Headless mode (set to true for CI/CD)
headless = false

# Show response times for each request
print_stats = true
