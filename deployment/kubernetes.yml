apiVersion: v1
kind: Namespace
metadata:
  name: drishti

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: drishti-config
  namespace: drishti
data:
  STREAMING_BACKEND: "kafka"
  KAFKA_BROKERS: "kafka-broker-0.kafka-broker-headless.drishti.svc.cluster.local:9092"
  KAFKA_TOPIC: "ntes-train-updates"
  BATCH_SIZE: "100"
  MAX_WORKERS: "4"
  LOG_LEVEL: "INFO"

---
apiVersion: v1
kind: Secret
metadata:
  name: drishti-secrets
  namespace: drishti
type: Opaque
stringData:
  DB_USER: drishti
  DB_PASSWORD: drishti-secure-2026
  DB_HOST: postgres-service.drishti.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: drishti

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drishti-api
  namespace: drishti
  labels:
    app: drishti-api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: drishti-api
  template:
    metadata:
      labels:
        app: drishti-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - drishti-api
                topologyKey: kubernetes.io/hostname
      
      containers:
      - name: drishti-api
        image: drishti:latest
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        envFrom:
        - configMapRef:
            name: drishti-config
        - secretRef:
            name: drishti-secrets
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        volumeMounts:
        - name: data
          mountPath: /app/data
        
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
      
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: drishti-data-pvc
      
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: drishti-api-service
  namespace: drishti
  labels:
    app: drishti-api
spec:
  type: LoadBalancer
  selector:
    app: drishti-api
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  sessionAffinity: ClientIP

---
apiVersion: autoscaling.k8s.io/v2
kind: HorizontalPodAutoscaler
metadata:
  name: drishti-api-hpa
  namespace: drishti
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: drishti-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: drishti-data-pvc
  namespace: drishti
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: drishti-api
  namespace: drishti
spec:
  selector:
    matchLabels:
      app: drishti-api
  endpoints:
  - port: http
    interval: 30s
    path: /metrics
