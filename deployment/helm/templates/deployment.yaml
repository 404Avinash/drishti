apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "drishti.fullname" . }}-api
  labels:
    {{- include "drishti.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "drishti.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
      labels:
        {{- include "drishti.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      securityContext:
        runAsNonRoot: {{ .Values.podSecurityPolicy.runAsNonRoot }}
        runAsUser: {{ .Values.podSecurityPolicy.runAsUser }}
        fsGroup: 1000
      
      serviceAccountName: {{ include "drishti.serviceAccountName" . }}
      
      containers:
      - name: api
        securityContext:
          allowPrivilegeEscalation: {{ .Values.podSecurityPolicy.allowPrivilegeEscalation }}
          readOnlyRootFilesystem: {{ .Values.podSecurityPolicy.readOnlyRootFilesystem }}
        
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        env:
        - name: STREAMING_BACKEND
          value: {{ .Values.streaming.backend | quote }}
        - name: BATCH_SIZE
          value: {{ .Values.streaming.batchSize | quote }}
        - name: MAX_WORKERS
          value: {{ .Values.streaming.maxWorkers | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.logging.level | quote }}
        - name: AUDIT_LOG_FILE
          value: {{ .Values.logging.auditLogFile | quote }}
        
        {{- if eq .Values.streaming.backend "kafka" }}
        - name: KAFKA_BROKERS
          value: {{ join "," .Values.kafka.brokers | quote }}
        - name: KAFKA_TOPIC
          value: {{ .Values.kafka.topic | quote }}
        - name: KAFKA_GROUP_ID
          value: "drishti-{{ .Values.global.region }}"
        {{- else if eq .Values.streaming.backend "redis" }}
        - name: REDIS_HOST
          value: {{ .Values.redis.host | quote }}
        - name: REDIS_PORT
          value: {{ .Values.redis.port | quote }}
        {{- end }}
        
        {{- if .Values.database.enabled }}
        - name: DB_HOST
          value: {{ .Values.database.host | quote }}
        - name: DB_PORT
          value: {{ .Values.database.port | quote }}
        - name: DB_NAME
          value: {{ .Values.database.name | quote }}
        - name: DB_USER
          value: {{ .Values.database.username | quote }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "drishti.fullname" . }}-db-secret
              key: password
        {{- end }}
        
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        {{- if .Values.persistence.enabled }}
        volumeMounts:
        - name: data
          mountPath: {{ .Values.persistence.mountPath }}
        {{- end }}
      
      {{- if .Values.persistence.enabled }}
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "drishti.fullname" . }}-pvc
      {{- end }}
      
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      terminationGracePeriodSeconds: 30
