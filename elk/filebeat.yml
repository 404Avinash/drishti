filebeat.config:
  modules:
    path: ${path.config}/modules.d/*.yml
    reload.enabled: false

filebeat.inputs:
  - type: container
    enabled: true
    paths:
      - '/var/lib/docker/containers/*/*.log'
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - add_fields:
          target: ''
          fields:
            service.name: drishti
            environment: production

  - type: log
    enabled: true
    paths:
      - '/var/log/syslog'
      - '/var/log/auth.log'
    tags: ["syslog"]

processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_docker_metadata: ~
  - add_kubernetes_metadata: ~
  - drop_event:
      when.regexp:
        message: "^DBG"

output.elasticsearch:
  enabled: true
  hosts: ["elasticsearch:9200"]
  username: "elastic"
  password: "${ELASTIC_PASSWORD}"
  index: "filebeat-drishti-%{+yyyy.MM.dd}"

logging.level: info
logging.to_stderr: false
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644
