input {
  # TCP input for general logs
  tcp {
    port => 5000
    codec => json
    tags => ["tcp-input"]
  }

  # UDP input for syslog
  udp {
    port => 5000
    codec => json
    tags => ["udp-input"]
  }

  # HTTP input for direct posts
  http {
    port => 8080
    codec => json
    tags => ["http-input"]
  }
}

filter {
  # Parse JSON if not already parsed
  if [message] =~ /^\{/ {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }

  # Add timestamp if missing
  if ![timestamp] {
    mutate {
      add_field => { "[@metadata][timestamp]" => "%{@timestamp}" }
    }
  }

  # Extract log level
  if [level] == "ERROR" or [message] =~ /(?i)error/ {
    mutate {
      add_field => { "severity" => "ERROR" }
      add_tag => [ "error" ]
    }
  } else if [level] == "WARNING" or [message] =~ /(?i)warning/ {
    mutate {
      add_field => { "severity" => "WARNING" }
      add_tag => [ "warning" ]
    }
  } else {
    mutate {
      add_field => { "severity" => "INFO" }
    }
  }

  # Extract source host/service
  if [host] {
    mutate {
      copy => { "host" => "[@metadata][index_type]" }
    }
  } else {
    mutate {
      add_field => { "host" => "unknown" }
      add_field => { "[@metadata][index_type]" => "unknown" }
    }
  }

  # Environment tagging
  if [@metadata][environment] {
    mutate {
      copy => { "[@metadata][environment]" => "environment" }
    }
  } else {
    mutate {
      add_field => { "environment" => "production" }
    }
  }

  # Add processing metadata
  mutate {
    add_field => { "[@metadata][pipeline]" => "drishti-main" }
    add_field => { "[@metadata][version]" => "1.0" }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "drishti-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
    action => "index"
  }

  # Console output for debugging (comment out in production)
  # stdout {
  #   codec => rubydebug
  # }

  # Send errors to separate index
  if "error" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      index => "drishti-errors-%{+YYYY.MM.dd}"
      document_type => "_doc"
      action => "index"
    }
  }
}
